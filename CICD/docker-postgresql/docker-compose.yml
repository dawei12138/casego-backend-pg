version: '3.8'

# PostgreSQL 版本 Docker Compose 配置（独立部署）
# 使用方式: docker compose -f CICD/docker-compose-pg.yml up -d
# 或通过部署脚本: ./CICD/docker-postgresql/deploy.sh start

services:
  # PostgreSQL 数据库
  postgres:
    build:
      context: ..
      dockerfile: ./CICD/docker-postgresql/postgresql/Dockerfile
    container_name: casego-pg-postgres
    image: casego-pg-postgres:latest
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=123456
      - POSTGRES_DB=casego
      - TZ=Asia/Shanghai
    #ports:
      #- "54321:5432"
    volumes:
      # 持久化数据库数据
      - ./CICD/data-pg/postgresql:/var/lib/postgresql/data
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=768MB
      -c work_mem=4MB
      -c maintenance_work_mem=128MB
      -c log_timezone=Asia/Shanghai
      -c timezone=Asia/Shanghai
    networks:
      casego_pg_net:
        ipv4_address: 10.89.0.3
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d casego"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    build:
      context: ..
      dockerfile: ./CICD/docker-postgresql/redis/Dockerfile
    container_name: casego-pg-redis
    image: casego-pg-redis:latest
    restart: always
    environment:
      - TZ=Asia/Shanghai
    #ports:
      #- "6689:6379"
    volumes:
      # 持久化 Redis 数据
      - ./CICD/data-pg/redis:/data
    networks:
      casego_pg_net:
        ipv4_address: 10.89.0.4
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "123456", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI 后端 (PostgreSQL 版本)
  backend:
    build:
      context: ..
      dockerfile: ./CICD/docker-postgresql/backend/Dockerfile
    container_name: casego-pg-backend
    image: casego-pg-backend:latest
    restart: always
    environment:
      - TZ=Asia/Shanghai
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - APP_ENV=prod
      - APP_PORT=9099
      - APP_WORKERS=3
      - DB_TYPE=postgres
      - DB_HOST=10.89.0.3
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=123456
      - DB_DATABASE=casego
      - REDIS_HOST=10.89.0.4
      - REDIS_PORT=6379
      - REDIS_PASSWORD=123456
    ports:
      - "9099:9099"
    volumes:
      # 映射应用目录
      - ./CICD/data-pg/backend/:/app/
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      casego_pg_net:
        ipv4_address: 10.89.0.5
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9099/docs"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MCP Server
  mcpserver:
    build:
      context: ..
      dockerfile: ./CICD/docker-postgresql/mcpserver/Dockerfile
    container_name: casego-pg-mcpserver
    image: casego-pg-mcpserver:latest
    restart: always
    environment:
      - TZ=Asia/Shanghai
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - APP_ENV=prod
      - MCP_PORT=8001
      - DB_TYPE=postgres
      - DB_HOST=10.89.0.3
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=123456
      - DB_DATABASE=casego
      - REDIS_HOST=10.89.0.4
      - REDIS_PORT=6379
      - REDIS_PASSWORD=123456
#    ports:
#      - "9222:8001"
    volumes:
      # 映射数据目录
      - ./CICD/data-pg/mcpserver/:/app/
    depends_on:
      redis:
        condition: service_healthy
    networks:
      casego_pg_net:
        ipv4_address: 10.89.0.7
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/docs"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx 前端
  nginx:
    build:
      context: ..
      dockerfile: ./CICD/docker-postgresql/nginx/Dockerfile
    container_name: casego-pg-nginx
    image: casego-pg-nginx:latest
    restart: always
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "80:80"
    volumes:
      # 映射日志目录（推荐）
      - ./CICD/data-pg/nginx/logs:/var/log/nginx
      # 映射前端文件和配置
      - ./CICD/data-pg/nginx/html:/data/html
      - ./CICD/data-pg/nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - backend
    networks:
      casego_pg_net:
        ipv4_address: 10.89.0.6

networks:
  casego_pg_net:
    name: casego_pg_net
    driver: bridge
    ipam:
      config:
        - subnet: 10.89.0.0/24
