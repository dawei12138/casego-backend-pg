# Redis 配置文件
bind 0.0.0.0
protected-mode yes
port 6379

# 设置密码
requirepass 123456

# 持久化配置
save 900 1
save 300 10
save 60 10000

# AOF 持久化
appendonly yes
appendfilename "appendonly.aof"

# 日志
loglevel notice
logfile ""

# 最大内存策略
maxmemory-policy allkeys-lru

# 超时设置
timeout 0
tcp-keepalive 300

# 数据库数量
databases 16
