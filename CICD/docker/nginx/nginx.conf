# 自定义日志格式 - 记录真实IP相关信息
log_format detailed_log '$remote_addr - $remote_user [$time_local] '
                        '"$request" $status $body_bytes_sent '
                        '"$http_referer" "$http_user_agent" '
                        'X-Real-IP="$http_x_real_ip" '
                        'X-Forwarded-For="$http_x_forwarded_for" '
                        'upstream_addr="$upstream_addr" '
                        'request_time=$request_time '
                        'upstream_response_time=$upstream_response_time';

server {
    listen 80;
    server_name localhost;

    root /data/html;
    index index.html;

    client_max_body_size 1024m;

    # 使用详细日志格式
    access_log /var/log/nginx/access.log detailed_log;
    error_log /var/log/nginx/error.log warn;

    # 信任容器网络网关，从 X-Forwarded-For 获取真实客户端 IP
    set_real_ip_from 10.88.0.0/16;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    # 后端静态文件（Swagger UI 等）
    # ^~ 表示优先于正则匹配，确保后端静态资源不被缓存规则拦截
    location ^~ /static/ {
        proxy_pass http://10.88.0.5:9099;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 后端 API 接口
    # ^~ 表示优先于正则匹配，确保API请求（包括图片、文件）不被缓存规则拦截
    location ^~ /dev-api/ {
        rewrite ^/dev-api/(.*)$ /$1 break;
        proxy_pass http://10.88.0.5:9099;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 超时设置
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # Swagger 文档
    location ~ ^/(swagger-ui.*|openapi\.json|docs|redoc)$ {
        proxy_pass http://10.88.0.5:9099;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # WebSocket 支持
    location /ws/ {
        proxy_pass http://10.88.0.5:9099;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 超时设置
        proxy_read_timeout 36000s;
        proxy_send_timeout 36000s;
    }

    # MCP Server
    location /v1/mcp {
        proxy_pass http://10.88.0.7:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时设置
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # 前端路由（SPA）
    location / {
        try_files $uri $uri/ /index.html;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
    }

    # 静态资源缓存
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
