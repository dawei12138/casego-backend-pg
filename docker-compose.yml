version: '3.8'

# 生产环境部署配置 - 使用阿里云镜像仓库
# 使用方式: docker-compose up -d

services:
  # MySQL 数据库
  mysql:
    image: registry.cn-hangzhou.aliyuncs.com/dawei_12138/python_project:casego-mysql
    container_name: casego-mysql
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=123456
      - MYSQL_DATABASE=casego
      - TZ=Asia/Shanghai
    #ports:
      #- "33306:3306"
    volumes:
      # 持久化数据库数据
      - ./data/mysql:/var/lib/mysql
    command: >
      --default-authentication-plugin=mysql_native_password
      --bind-address=0.0.0.0
      --connect-timeout=10000
      --wait-timeout=28800
      --interactive-timeout=28800
    networks:
      casego_net:
        ipv4_address: 10.88.0.3
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: registry.cn-hangzhou.aliyuncs.com/dawei_12138/python_project:casego-redis
    container_name: casego-redis
    restart: always
    environment:
      - TZ=Asia/Shanghai
    #ports:
      #- "6689:6379"
    volumes:
      # 持久化 Redis 数据
      - ./data/redis:/data
    networks:
      casego_net:
        ipv4_address: 10.88.0.4
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "123456", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI 后端
  backend:
    image: registry.cn-hangzhou.aliyuncs.com/dawei_12138/python_project:casego-backend
    container_name: casego-backend
    restart: always
    environment:
      - TZ=Asia/Shanghai
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - APP_ENV=prod
      - APP_PORT=9099
      - APP_WORKERS=3
      - DB_HOST=10.88.0.3
      - DB_PORT=3306
      - DB_USERNAME=root
      - DB_PASSWORD=123456
      - DB_DATABASE=casego
      - REDIS_HOST=10.88.0.4
      - REDIS_PORT=6379
      - REDIS_PASSWORD=123456
    ports:
      - "9099:9099"
    volumes:
      # 映射应用目录
      - ./data/backend:/app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      casego_net:
        ipv4_address: 10.88.0.5
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9099/docs"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MCP Server
  mcpserver:
    image: registry.cn-hangzhou.aliyuncs.com/dawei_12138/python_project:casego-mcpserver
    container_name: casego-mcpserver
    restart: always
    environment:
      - TZ=Asia/Shanghai
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - APP_ENV=prod
      - DB_HOST=10.88.0.3
      - DB_PORT=3306
      - DB_USERNAME=root
      - DB_PASSWORD=123456
      - DB_DATABASE=casego
      - REDIS_HOST=10.88.0.4
      - REDIS_PORT=6379
      - REDIS_PASSWORD=123456
#    ports:
#      - "8001:8001"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      casego_net:
        ipv4_address: 10.88.0.7

  # Nginx 前端
  nginx:
    image: registry.cn-hangzhou.aliyuncs.com/dawei_12138/python_project:casego-nginx
    container_name: casego-nginx
    restart: always
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "80:80"
    volumes:
      # 映射日志目录
      - ./data/nginx/logs:/var/log/nginx
      # 映射前端文件和配置
      - ./data/nginx/html:/data/html
      - ./data/nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - backend
      - mcpserver
    networks:
      casego_net:
        ipv4_address: 10.88.0.6

networks:
  casego_net:
    name: casego_net
    driver: bridge
    ipam:
      config:
        - subnet: 10.88.0.0/24
